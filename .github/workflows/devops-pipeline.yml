name: Foundational DevOps Pipeline

# 1. Trigger the workflow on every push to the main branch
on:
  push:
    branches: [main]

# 2. Define the execution track
jobs:
  code-verification:
    # This must have exactly 4 spaces to align under the job block
    runs-on: ubuntu-latest

    steps:
      # Each dash (-) inside steps must align perfectly under the 's' of steps
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Run System Diagnostics Scan
        run: |
          echo "================================="
          echo "Starting Automated Cloud Security Scan....."
          echo "Current Repository Workspace: $GITHUB_WORKSPACE"
          echo "Triggered By Github Actor: $GITHUB_ACTOR"
          echo "======================================="

      - name: Verify Repository Architecture Integrity
        run: |
          ls -la
          echo "Verification Check: SUCCESS"

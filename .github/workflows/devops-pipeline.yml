name: Day 21 DevSecOps Automated Security Pipeline

on:
  push:
    branches: [main]


jobs:
  code-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Verify Architecture
        run: ls -la

  security-compliance-scan:
    runs-on: ubuntu-latest
    needs: code-verification

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      # Step A: Pre Compile the Container image locally on the runner for scanning

      - name: Build Local Image for Security Audit
        run: |
          docker build -t local-audit-image:test ./devops_day_17_docker_multistage

     # Step B: Run Trivy Security Vulnerbility Scanner Directly on The Image

      - name: Run Trivy Vulnerbility Scan
        used: aquasecurity/trivy-action@master
        with:
          image-ref: 'local-audit-image:test'
          format: 'table'
          exit-code: '0'  # Set to '1' in Production to break the build if critical flaws exit
          severity: 'CRITICAL,HIGH'


  build-and-push-registry:
    runs-on: ubuntu@latest

    # This ensures the image is ONLY pushed if the security scan step runs!
    needs: security-compliance_scan


    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./devops_day_17_docker_multistage
          file:  ./devops_day_17_docker_multistage/Dockerfile
          push: true
          tags: gauravbanga/multistage-test:latest
